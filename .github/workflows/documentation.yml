name: "Documentation"

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/workflows/documentation.yml"
      - "docs/**"
      - "packages/**"
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/documentation.yml"
      - "docs/**"
      - "packages/**"

jobs:
  validate-with-guides:
    name: "Validate documentation with phpDocumentor/guides"
    runs-on: "ubuntu-22.04"

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Install PHP"
        uses: "shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f" # v2
        with:
          coverage: "none"
          php-version: "8.2"
          extensions: "inotify, pcntl"

      - name: "Set COMPOSER_ROOT_VERSION"
        run: |
          echo "COMPOSER_ROOT_VERSION=1.x-dev" >> $GITHUB_ENV

      - name: "Install dependencies with Composer"
        uses: "ramsey/composer-install@a8d0d959dab41457692a5e2041bd9b757a119e3f" # v3
        with:
          dependency-versions: "highest"

      - name: "Run guides-cli"
        run: "vendor/bin/guides -vvv --no-progress docs --output='/tmp/test' --fail-on-log"

  build:
    name: "Documentation"
    if: "${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Build"
        uses: "phpDocumentor/phpDocumentor@b5d2275120f69291e98927f335c5517bd2c1b541" # master

      - name: "Upload"
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f" # v7
        with:
          name: "documentation"
          path: "build/docs"
          retention-days: 1

  deploy:
    name: "Deploy"
    if: "${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}"
    runs-on: "ubuntu-latest"
    needs: "build"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          repository: "phpDocumentor/docs"
          token: "${{ secrets.BOT_TOKEN }}"
          path: "docs"

      - name: "Download"
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8
        with:
          name: "documentation"
          path: "build/docs"

      - name: "Copy files"
        run: "rsync -r --delete build/docs/* docs/docs/components/guides"

      - name: "Commit"
        uses: "stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9" # v7
        with:
          repository: "docs"
          commit_message: "Update guides documentation"

      - name: "Push"
        uses: "ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599" # master
        with:
          directory: "docs"
          github_token: "${{ secrets.BOT_TOKEN }}"
          repository: "phpDocumentor/docs"
